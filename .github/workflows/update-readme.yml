name: Update README

on:
  push:
    branches: [main]
    paths:
      - 'operating-system/**'
      - 'system-design/**'
      - 'docker/**'
      - 'java/**'
      - 'algorithm/**'
      - 'kafka/**'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update README.md
        run: bash .github/scripts/update-readme.sh

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "docs: README.md TIL 목록 자동 업데이트"
          git push
